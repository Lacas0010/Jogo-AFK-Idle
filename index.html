<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Joguinho AFK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Idle Game</h1>
    <div class="hud">Tesouro do Reino: $<span id="pontos">0</span></div>
    <canvas id="jogoCanvas" width="800" height="450"></canvas>
    
    <div id="painelSkills" style="margin-top: 10px;">
        <button id="btnSkill_0_0" class="btn-upgrade btn-skill" onclick="ativarSkill(0, 0)">🔥 Lâmina Incandescente</button>
        <button id="btnSkill_1_0" class="btn-upgrade btn-skill" style="background: #2980b9;" onclick="ativarSkill(1, 0)">🏹 Rajada de Glifos</button>
        <button id="btnSkill_2_0" class="btn-upgrade btn-skill" style="background: #8e44ad; display: none;" onclick="ativarSkill(2, 0)">🔮 Comet Azur</button>
        <button id="btnSkill_3_0" class="btn-upgrade btn-skill" style="background: #7f8c8d; display: none;" onclick="ativarSkill(3, 0)">⚙️ Baluarte Vetorial</button>
    </div>

    <div class="menu-abas">
        <button class="btn-aba active" onclick="alternarAba('abaUpgrades')">⚔️ Upgrades</button>
        <button class="btn-aba" onclick="alternarAba('abaGacha')">🔮 Gacha</button>
        <button class="btn-aba" onclick="alternarAba('abaStatus')">📊 Status</button>
        <button class="btn-aba" onclick="alternarAba('abaEquipe')">🛡️ Equipe</button>
    </div>

    <div id="abaUpgrades" class="aba-conteudo active">
        <div id="painelUpgrades" class="controles painel-upgrades"></div>
    </div>

    <div id="abaGacha" class="aba-conteudo">
        <div id="painelGacha" class="painel-gacha">
            <h2>🔮 Altar de Invocação</h2>
            <p>Gemas: <span id="gemas">0</span> | Pity: <span id="pityGacha">0</span>/50</p>
            <button id="btnGacha" class="btn-upgrade btn-gacha-1" onclick="darTiroGacha(1)">1 Tiro (10 Gemas)</button>
            <button id="btnGacha10" class="btn-upgrade btn-gacha-10" onclick="darTiroGacha(10)">10 Tiros (100 Gemas)</button>
            <button class="btn-upgrade btn-gacha-teste" onclick="darGemasTeste()">+100 Gemas (Teste)</button>
        </div>
    </div>

    <div id="abaStatus" class="aba-conteudo">
        <div id="statusHerois"></div>
    </div>

    <div id="abaEquipe" class="aba-conteudo">
        <h2>🛡️ Formação do Time (<span id="tamanhoTime">1</span>/3)</h2>
        <div id="painelGerenciarEquipe" class="controles" style="flex-direction: column; gap: 15px; align-items: center;"></div>
    </div>

    <div class="controles">
        <button class="btn-reset" onclick="resetarJogo()">Resetar Progresso</button>
    </div>

    <script type="module" src="engine.js"></script>
</body>
</html>
